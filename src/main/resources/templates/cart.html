<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header h1 { font-size: 24px; color: #333; }
        .cart-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cart-item { padding: 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .cart-item:last-child { border-bottom: none; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 16px; color: #333; margin-bottom: 4px; }
        .item-price { color: #666; font-size: 14px; }
        .quantity-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 32px; height: 32px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .qty-btn:hover { background: #f5f5f5; }
        .quantity { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; min-width: 50px; text-align: center; }
        .item-total { font-weight: 600; color: #333; min-width: 80px; text-align: right; }
        .summary { padding: 20px; border-top: 1px solid #eee; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .summary-total { font-weight: 600; font-size: 18px; padding-top: 12px; border-top: 1px solid #eee; }
        .payment-section { margin-top: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .payment-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0; }
        .payment-option { padding: 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; text-align: center; }
        .payment-option:hover { border-color: #e23744; }
        .payment-option.selected { border-color: #e23744; background: #fdf2f2; }
        .checkout-btn { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .checkout-btn:disabled { background: #ccc; cursor: not-allowed; }
        .checkout-btn:hover:not(:disabled) { background: #218838; }
        .empty-cart { text-align: center; padding: 60px 20px; color: #666; }
        .back-btn { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 6px; margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
        .success-icon { font-size: 60px; color: #28a745; margin-bottom: 20px; }
        .modal h2 { margin-bottom: 16px; color: #333; }
        .modal p { color: #666; margin-bottom: 24px; }
        .modal-btn { padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <a th:href="@{'/customer/' + ${customerId}}" class="back-btn">← Back to Menu</a>
        
        <div class="header">
            <h1>Shopping Cart</h1>
        </div>

        <div class="cart-container">
            <div th:if="${cart.items != null and !cart.items.empty}">
                <div th:each="item : ${cart.items}" class="cart-item">
                    <div class="item-info">
                        <div class="item-name" th:text="${item.menuItem.name}"></div>
                        <div class="item-price">₹<span th:text="${#numbers.formatDecimal(item.menuItem.price, 1, 2)}"></span></div>
                    </div>
                    <div class="quantity-controls">
                        <form action="/cart/update" method="post" style="display: inline;">
                            <input type="hidden" name="customerId" th:value="${customerId}">
                            <input type="hidden" name="menuItemId" th:value="${item.menuItem.id}">
                            <input type="hidden" name="action" value="decrease">
                            <button type="submit" class="qty-btn">-</button>
                        </form>
                        <div class="quantity" th:text="${item.quantity}"></div>
                        <form action="/cart/update" method="post" style="display: inline;">
                            <input type="hidden" name="customerId" th:value="${customerId}">
                            <input type="hidden" name="menuItemId" th:value="${item.menuItem.id}">
                            <input type="hidden" name="action" value="increase">
                            <button type="submit" class="qty-btn">+</button>
                        </form>
                    </div>
                    <div class="item-total">₹<span th:text="${#numbers.formatDecimal(item.menuItem.price * item.quantity, 1, 2)}"></span></div>
                </div>
                
                <div class="summary">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹<span th:text="${#numbers.formatDecimal(totalAmount, 1, 2)}"></span></span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span>₹30.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Taxes</span>
                        <span>₹<span th:text="${#numbers.formatDecimal(totalAmount * 0.05, 1, 2)}"></span></span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>₹<span th:text="${#numbers.formatDecimal(totalAmount + 30 + (totalAmount * 0.05), 1, 2)}"></span></span>
                    </div>
                </div>
            </div>
            
            <div th:if="${cart.items == null or cart.items.empty}" class="empty-cart">
                <h2>Your cart is empty</h2>
                <p>Add items to get started</p>
            </div>
        </div>
        
        <div th:if="${cart.items != null and !cart.items.empty}" class="payment-section">
            <h3>Payment Method</h3>
            <div class="payment-options">
                <div class="payment-option" onclick="selectPayment('card')">💳 Card</div>
                <div class="payment-option" onclick="selectPayment('upi')">📱 UPI</div>
                <div class="payment-option" onclick="selectPayment('wallet')">👛 Wallet</div>
                <div class="payment-option" onclick="selectPayment('cod')">💵 Cash</div>
            </div>
            <button class="checkout-btn" id="checkoutBtn" disabled onclick="checkout()">Select Payment Method</button>
        </div>
    </div>
    
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="success-icon">✅</div>
            <h2>Order Placed!</h2>
            <p>Your order has been confirmed and will be delivered in 25-35 minutes.</p>
            <p><strong>Order ID:</strong> #<span id="orderId"></span></p>
            <button class="modal-btn" onclick="closeModal()">Continue Shopping</button>
        </div>
    </div>
    
    <script>
        let selectedPayment = '';
        
        function selectPayment(method) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            selectedPayment = method;
            document.getElementById('checkoutBtn').disabled = false;
            document.getElementById('checkoutBtn').textContent = 'Place Order';
        }
        
        function checkout() {
            if (!selectedPayment) return;
            
            fetch('/cart/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `customerId=${document.querySelector('input[name="customerId"]')?.value || ''}&paymentMethod=${selectedPayment}`
            }).then(() => {
                document.getElementById('orderId').textContent = Math.floor(Math.random() * 900000) + 100000;
                document.getElementById('successModal').style.display = 'block';
            });
        }
        
        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            window.location.href = '/customer/' + (document.querySelector('input[name="customerId"]')?.value || '');
        }
    </script>
</body>
</html>
